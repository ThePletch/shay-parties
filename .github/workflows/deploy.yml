name: Deploy
on:
  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: choice
        # manual deploys to prod will be limited to master by environment rules
        options: [production, staging]
      createdb:
        required: true
        type: boolean
        default: false
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      AWS_ECR_ROLE:
        required: true
      AWS_REGION:
        required: true
      AWS_ECR_REPOSITORY:
        required: true
      AWS_ECS_CLUSTER:
        required: true
      AWS_ECS_SERVICE:
        required: true
jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
    - uses: actions/checkout@v4
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ secrets.AWS_ECR_ROLE }}
        aws-region: ${{ secrets.AWS_REGION }}
    - name: Log in to AWS ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v4
      with:
        # list of Docker images to use as base name for tags
        images: |
          ${{ steps.login-ecr.outputs.registry }}/${{ secrets.AWS_ECR_REPOSITORY }}
        # generate Docker tags based on the following events/attributes
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,format=long
          type=raw,value=latest
    # TODO split out bundle install into separate step that caches in GHA cache,
    # currently it's not cached at all due to multi-stage builds
    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        pull: true
        tags: ${{ steps.meta.outputs.tags }}
        build-args: |
          PORT=3030
          ENVIRONMENT=${{ inputs.environment }}
        secrets: |
          CREDENTIALS_KEY=${{ secrets.RAILS_MASTER_KEY }}
        cache-from: |
          type=gha
          type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ secrets.AWS_ECR_REPOSITORY }}:latest
        cache-to: |
          type=gha
        target: server-shrinkwrapped
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    needs: [build]
    outputs:
      task-definition-arn: ${{ steps.trigger-deploy.outputs.task-definition-arn }}
      network-config: ${{ steps.trigger-deploy.outputs.network-config }}
    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ secrets.AWS_ECR_ROLE }}
        aws-region: ${{ secrets.AWS_REGION }}
    - name: Trigger deploy of ECS service
      id: trigger-deploy
      env:
        CLUSTER: ${{ secrets.AWS_ECS_CLUSTER }}
        SERVICE: ${{ secrets.AWS_ECS_SERVICE }}
        AWS_REGION: ${{ secrets.AWS_REGION }}
      run: |
        aws ecs update-service --cluster $CLUSTER \
          --service $SERVICE \
          --force-new-deployment  \
          > service-info.json
        echo "task-definition-arn=$(jq '.service.taskDefinition' service-info.json -r)" >> $GITHUB_OUTPUT
        
        echo "network-config=<<EOF" >> $GITHUB_OUTPUT
        jq '.service.networkConfiguration' service-info.json -r >> $GITHUB_OUTPUT
        echo 'EOF' >> $GITHUB_OUTPUT
  migrate:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    needs: [deploy]
    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ secrets.AWS_ECR_ROLE }}
        aws-region: ${{ secrets.AWS_REGION }}
    - name: Create database
      if: inputs.createdb
      env:
        AWS_REGION: ${{ secrets.AWS_REGION }}
        TASK_NETWORK_CONFIG: ${{ needs.deploy.outputs.network-config }}
        CONTAINER_OVERRIDES: >
          {
            "containerOverrides": [
              {
                "name": "rails",
                "command": [
                  "bundle",
                  "exec",
                  "rails",
                  "db:setup"
                ]
              }
            ]
          }
      run: |
        # doesn't wait for task completion before exiting - we can use `aws ecs wait` if we need to do
        # post-migration tasks in the future.
        aws ecs run-task \
          --cluster ${{ secrets.AWS_ECS_CLUSTER }} \
          --launch-type FARGATE \
          --task-definition ${{ needs.deploy.outputs.task-definition-arn }} \
          --network-configuration "$TASK_NETWORK_CONFIG" \
          --overrides "$CONTAINER_OVERRIDES"
    # heavily copypasted - find a way to just switch the base rails command?
    - name: Run migrations
      if: ${{ ! inputs.createdb }}
      env:
        AWS_REGION: ${{ secrets.AWS_REGION }}
        TASK_NETWORK_CONFIG: ${{ needs.deploy.outputs.network-config }}
        CONTAINER_OVERRIDES: >
          {
            "containerOverrides": [
              {
                "name": "rails",
                "command": [
                  "bundle",
                  "exec",
                  "rails",
                  "db:migrate"
                ]
              }
            ]
          }
      run: |
        # doesn't wait for task completion before exiting - we can use `aws ecs wait` if we need to do
        # post-migration tasks in the future.
        aws ecs run-task \
          --cluster ${{ secrets.AWS_ECS_CLUSTER }} \
          --launch-type FARGATE \
          --task-definition ${{ needs.deploy.outputs.task-definition-arn }} \
          --network-configuration "$TASK_NETWORK_CONFIG" \
          --overrides "$CONTAINER_OVERRIDES"